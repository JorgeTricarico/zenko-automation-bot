# =============================================================
# ZENKO — Render Blueprint (Free Tier Optimized)
# 1 Web Service (backend unificado) + 2 Static Sites (gratis)
# =============================================================

services:

  # ─────────────────────────────────────────────
  # BACKEND UNIFICADO — Zenco + Damian APIs
  # ─────────────────────────────────────────────
  - type: web
    name: zenko-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx tsc --outDir dist
    startCommand: node dist/src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # ─────────────────────────────────────────────
  # ZENCO FRONTEND — Dashboard Ana & Ariel
  # ─────────────────────────────────────────────
  - type: web
    name: zenco-frontend
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ─────────────────────────────────────────────
  # DAMIAN FRONTEND — Dashboard Masajes
  # ─────────────────────────────────────────────
  - type: web
    name: damian-frontend
    runtime: static
    rootDir: damian-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
