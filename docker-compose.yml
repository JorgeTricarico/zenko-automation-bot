version: '3.8'

# ============================================================
# ZENKO — Ropa: reparación y diseño
# ============================================================
services:
  zenco-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      - zenco-backend

  zenco-backend:
    build:
      context: ./server-bot
      dockerfile: Dockerfile.bot
    ports:
      - "3000:3000"
    env_file:
      - ./server-bot/.env
    restart: unless-stopped
    volumes:
      - zenco_auth:/app/auth_info_baileys

# ============================================================
# DAMIAN — Masajes: agenda y atencion al cliente
# ============================================================
  damian-frontend:
    build:
      context: ./damian-frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5174:80"
    restart: unless-stopped
    depends_on:
      - damian-backend

  damian-backend:
    build:
      context: ./damian-bot
      dockerfile: Dockerfile.bot
    ports:
      - "3001:3001"
    env_file:
      - ./damian-bot/.env
    restart: unless-stopped
    volumes:
      - damian_auth:/app/auth_info_baileys

# ============================================================
# Volumes persistentes — uno por negocio, sin mezcla
# ============================================================
volumes:
  zenco_auth:
  damian_auth:
